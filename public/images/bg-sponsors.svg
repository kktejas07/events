<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="sbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d0d2b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#sbg)"/>
  <!-- Connected network nodes -->
  <g opacity="0.1" fill="none" stroke="#7c3aed" stroke-width="0.8">
    <line x1="100" y1="100" x2="200" y2="80"/>
    <line x1="200" y1="80" x2="300" y2="120"/>
    <line x1="300" y1="120" x2="400" y2="90"/>
    <line x1="400" y1="90" x2="500" y2="150"/>
    <line x1="200" y1="80" x2="150" y2="200"/>
    <line x1="300" y1="120" x2="280" y2="250"/>
    <line x1="400" y1="90" x2="450" y2="200"/>
    <line x1="150" y1="200" x2="280" y2="250"/>
    <line x1="280" y1="250" x2="450" y2="200"/>
    <!-- Right side connections -->
    <line x1="550" y1="100" x2="650" y2="80"/>
    <line x1="650" y1="80" x2="720" y2="150"/>
    <line x1="550" y1="100" x2="580" y2="220"/>
    <line x1="580" y1="220" x2="650" y2="280"/>
    <line x1="650" y1="280" x2="720" y2="150"/>
  </g>
  <!-- Nodes with glow -->
  <g opacity="0.25">
    <circle cx="100" cy="100" r="5" fill="#7c3aed" filter="url(#glow2)"/>
    <circle cx="200" cy="80" r="4" fill="#06b6d4" filter="url(#glow2)"/>
    <circle cx="300" cy="120" r="5" fill="#7c3aed" filter="url(#glow2)"/>
    <circle cx="400" cy="90" r="4" fill="#06b6d4" filter="url(#glow2)"/>
    <circle cx="500" cy="150" r="3" fill="#7c3aed" filter="url(#glow2)"/>
    <circle cx="150" cy="200" r="4" fill="#06b6d4" filter="url(#glow2)"/>
    <circle cx="280" cy="250" r="5" fill="#7c3aed" filter="url(#glow2)"/>
    <circle cx="450" cy="200" r="4" fill="#06b6d4" filter="url(#glow2)"/>
    <circle cx="550" cy="100" r="4" fill="#7c3aed" filter="url(#glow2)"/>
    <circle cx="650" cy="80" r="5" fill="#06b6d4" filter="url(#glow2)"/>
    <circle cx="720" cy="150" r="4" fill="#7c3aed" filter="url(#glow2)"/>
    <circle cx="580" cy="220" r="3" fill="#06b6d4" filter="url(#glow2)"/>
    <circle cx="650" cy="280" r="4" fill="#7c3aed" filter="url(#glow2)"/>
  </g>
</svg>
