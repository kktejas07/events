<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="tbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#0d0d2b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#tbg)"/>
  <!-- Circuit board lines -->
  <g opacity="0.12" stroke="#06b6d4" stroke-width="1" fill="none">
    <path d="M0 80 L150 80 L150 40 L300 40 L300 80 L400 80"/>
    <path d="M200 0 L200 60 L350 60 L350 100 L500 100"/>
    <path d="M500 400 L500 320 L350 320 L350 280 L200 280 L200 200"/>
    <path d="M600 0 L600 120 L450 120 L700 120 L700 0"/>
    <path d="M0 200 L100 200 L100 300 L250 300 L250 200 L400 200"/>
    <path d="M700 400 L700 300 L600 300 L600 350 L500 350"/>
  </g>
  <!-- Circuit nodes -->
  <g opacity="0.2">
    <circle cx="150" cy="40" r="3" fill="#06b6d4" filter="url(#glow)"/>
    <circle cx="300" cy="80" r="3" fill="#06b6d4" filter="url(#glow)"/>
    <circle cx="350" cy="100" r="3" fill="#06b6d4" filter="url(#glow)"/>
    <circle cx="350" cy="280" r="3" fill="#06b6d4" filter="url(#glow)"/>
    <circle cx="200" cy="290" r="3" fill="#06b6d4" filter="url(#glow)"/>
    <circle cx="600" cy="120" r="3" fill="#06b6d4" filter="url(#glow)"/>
    <circle cx="250" cy="300" r="3" fill="#7c3aed" filter="url(#glow)"/>
    <circle cx="350" cy="280" r="3" fill="#7c3aed" filter="url(#glow)"/>
    <circle cx="100" cy="100" r="4" fill="#7c3aed" filter="url(#glow)"/>
    <circle cx="500" cy="350" r="4" fill="#7c3aed" filter="url(#glow)"/>
  </g>
  <!-- Dots grid -->
  <g opacity="0.04" fill="white">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.5" fill="white"/>
    </pattern>
    <rect width="800" height="400" fill="url(#dots)"/>
  </g>
</svg>
